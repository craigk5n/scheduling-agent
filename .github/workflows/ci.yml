name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install pinned Python
        run: uv python install

      - name: Sync dependencies (locked)
        run: uv sync --frozen

      # Each step calls the same scripts/ci.sh that developers run locally,
      # so local checks and CI can never drift. Split by stage for per-step
      # pass/fail visibility in the GitHub UI.
      - name: Lint (ruff)
        run: bash scripts/ci.sh lint

      - name: Format check (ruff)
        run: bash scripts/ci.sh format

      - name: Type check (mypy strict)
        run: bash scripts/ci.sh type

      - name: Security scan (bandit)
        run: bash scripts/ci.sh security

      - name: Tests + coverage gate
        run: bash scripts/ci.sh test

      # Eval suite in reference mode (no LLM): scores the golden dataset and
      # writes a report. Exits non-zero if any case regresses.
      - name: Eval report (reference mode)
        run: uv run python -m scheduling_agent.evals --mode reference --out eval-reports

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: eval-reports/
          if-no-files-found: ignore
