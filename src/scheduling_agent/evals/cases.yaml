# Golden evaluation dataset for the scheduling agent.
# Each case: an NL request, timezone, a reference "today", optional fixture
# events, the reference (ground-truth) ScheduleProposal, and the expected
# outcome semantics the scorer checks. This is a diverse starter set; add
# cases freely — the reference-consistency test keeps it honest.

- id: lunch-oneoff
  request: "Lunch with Dana next Tuesday at noon."
  timezone: America/New_York
  today: "2026-07-15"
  reference:
    action: create
    title: "Lunch with Dana"
    timezone: America/New_York
    start: "2026-07-21T12:00:00-04:00"
    duration_minutes: 60
  expected:
    action: create
    expect_conflict: false

- id: lunch-conflict
  request: "Book a 1-hour lunch next Tuesday at noon."
  timezone: America/New_York
  today: "2026-07-15"
  fixtures:
    - name: "Dentist"
      date: "20260721"
      time: "160000"
      duration: 60
  reference:
    action: create
    title: "Lunch"
    timezone: America/New_York
    start: "2026-07-21T12:00:00-04:00"
    duration_minutes: 60
  expected:
    action: create
    expect_conflict: true

- id: standup-mwf
  request: "Set up a team standup every Monday, Wednesday and Friday at 9:15am."
  timezone: America/New_York
  today: "2026-07-15"
  reference:
    action: create_recurring
    title: "Team Standup"
    timezone: America/New_York
    start: "2026-08-03T09:15:00-04:00"
    duration_minutes: 15
    recurrence: {freq: WEEKLY, by_day: [MO, WE, FR]}
  expected:
    action: create_recurring
    rrule: "FREQ=WEEKLY;BYDAY=MO,WE,FR"
    require_weekdays: [MO, WE, FR]

